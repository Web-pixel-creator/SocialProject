name: Web PR Gate

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'apps/api/src/config/**'
      - 'apps/api/src/db/**'
      - 'apps/api/src/logging/**'
      - 'apps/api/src/middleware/**'
      - 'apps/api/src/redis/**'
      - 'apps/api/src/routes/**'
      - 'apps/api/src/server.ts'
      - 'apps/api/src/services/**'
      - 'apps/api/src/storage/**'
      - 'apps/api/src/types/**'
      - 'package.json'
      - 'package-lock.json'
      - 'packages/**'
      - 'scripts/ci/**'
      - '.github/actions/append-step-summary/**'
      - '.github/actions/artifact-upload/**'
      - '.github/actions/node-ci-bootstrap/**'
      - '.github/actions/playwright-bootstrap/**'
      - '.github/actions/playwright-change-scope/**'
      - '.github/actions/playwright-artifacts-upload/**'
      - '.github/actions/playwright-e2e-summary/**'
      - '.github/actions/playwright-test-run/**'
      - '.github/actions/playwright-visual-summary/**'
      - '.github/actions/visual-policy-gate/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/web-pr-gate.yml'

concurrency:
  group: web-pr-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect_changes:
    name: Detect Web Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_critical: ${{ steps.scope.outputs.run_critical }}
      run_visual: ${{ steps.scope.outputs.run_visual }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Classify Playwright web scope
        id: scope
        uses: ./.github/actions/playwright-change-scope
        with:
          base_sha: ${{ github.event.pull_request.base.sha }}
          head_sha: ${{ github.sha }}
          summary_json_path: artifacts/ci/web-pr-gate-playwright-scope.json
          summary_md_path: artifacts/ci/web-pr-gate-playwright-scope.md
          summary_title: Web PR Gate Playwright Scope
          artifact_name: web-pr-gate-playwright-scope

  quality_web:
    name: Web Quality (Ultracite)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write
    needs: detect_changes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bootstrap Node CI tooling
        uses: ./.github/actions/node-ci-bootstrap
        with:
          fetch_depth: '0'

      - name: Run visual baseline policy gate
        uses: ./.github/actions/visual-policy-gate
        with:
          artifact_name: web-pr-visual-policy-summary
          base_sha: ${{ github.event.pull_request.base.sha }}
          head_sha: ${{ github.sha }}
          summary_json_path: artifacts/ci/web-pr-visual-policy-summary.json
          summary_md_path: artifacts/ci/web-pr-visual-policy-summary.md
          summary_title: Web PR Visual Baseline Policy Summary

      - name: Run Ultracite check (web scope)
        run: npx ultracite check apps/web/src

  build_web:
    name: Web Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality_web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bootstrap Node CI tooling
        uses: ./.github/actions/node-ci-bootstrap

      - name: Build web
        run: npm --workspace apps/web run build

  e2e_feed_smoke:
    name: Playwright Web Critical
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [detect_changes, build_web]
    if: needs.detect_changes.outputs.run_critical == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bootstrap Node CI tooling
        uses: ./.github/actions/node-ci-bootstrap

      - name: Bootstrap Playwright tooling
        uses: ./.github/actions/playwright-bootstrap

      - name: Run web E2E critical tests
        uses: ./.github/actions/playwright-test-run
        with:
          report_json_name: web-pr-gate-e2e-report.json
          npm_script: test:e2e:critical

      - name: Generate and upload Playwright PR critical summary
        if: always()
        uses: ./.github/actions/playwright-e2e-summary
        with:
          report_json_path: apps/web/test-results/web-pr-gate-e2e-report.json
          summary_json_path: artifacts/ci/web-pr-gate-e2e-summary.json
          summary_md_path: artifacts/ci/web-pr-gate-e2e-summary.md
          summary_title: Web PR Gate E2E Critical Summary
          artifact_summary_name: web-pr-gate-playwright-summary
          artifact_json_name: web-pr-gate-playwright-json-report
          top_slow: '10'
          slow_threshold_ms: '5000'

      - name: Upload Playwright report and results artifacts
        if: always()
        uses: ./.github/actions/playwright-artifacts-upload
        with:
          report_artifact_name: web-pr-gate-playwright-report
          results_artifact_name: web-pr-gate-playwright-results

  visual_smoke:
    name: Playwright Visual Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [detect_changes, build_web]
    if: needs.detect_changes.outputs.run_visual == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bootstrap Node CI tooling
        uses: ./.github/actions/node-ci-bootstrap

      - name: Bootstrap Playwright tooling
        uses: ./.github/actions/playwright-bootstrap

      - name: Run Playwright visual smoke tests
        uses: ./.github/actions/playwright-test-run
        with:
          report_json_name: web-pr-gate-visual-report.json
          spec_paths: e2e/visual-smoke.spec.ts

      - name: Generate and upload Playwright visual smoke summary
        if: always()
        uses: ./.github/actions/playwright-visual-summary
        with:
          artifacts_dir: apps/web/test-results
          report_json_path: apps/web/test-results/web-pr-gate-visual-report.json
          summary_json_path: artifacts/ci/web-pr-gate-visual-summary.json
          summary_md_path: artifacts/ci/web-pr-gate-visual-summary.md
          summary_title: Web PR Gate Visual Summary
          artifact_summary_name: web-pr-gate-visual-summary
          artifact_json_name: web-pr-gate-playwright-visual-json-report

      - name: Upload Playwright report and results artifacts
        if: always()
        uses: ./.github/actions/playwright-artifacts-upload
        with:
          report_artifact_name: web-pr-gate-playwright-visual-report
          results_artifact_name: web-pr-gate-playwright-visual-results
